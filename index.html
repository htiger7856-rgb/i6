<!DOCTYPE html>
<html>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>MAsad Billing</title>

<link rel='stylesheet' href='style.css'>
<link rel='manifest' href='manifest.json'>
</head>

<body>

<header>MAsad Billing</header>

<div class='tab'>
<button class='active' onclick="openPage('products', event)">Products</button>
<button onclick="openPage('invoice', event)">Invoice</button>
<button onclick="openPage('history', event)">History</button>
</div>

<div id='products' class='page' style='display:block;'>
<h2>Products</h2>
<input id='productSearch' placeholder='Search...' oninput='renderProducts()'>
<div id='productList'></div>

<h3>Add Product</h3>
<input id='pName' placeholder='Name'>
<input id='pRate' placeholder='Rate' type='number'>
<button onclick='addProduct()'>Add</button>
</div>

<div id='invoice' class='page'>
<h2>Create Invoice</h2>
<input id='invoiceName' placeholder='Customer Name'>

<input id='invoiceSearch' placeholder='Search product...' oninput='renderInvoiceSearch()'>
<div id='invoiceSearchList'></div>

<h3>Invoice Items</h3>
<div id='invoiceList'></div>

<h3>Total: PKR <span id='totalAmount'>0</span></h3>

<button class='danger-btn' onclick='clearInvoice()'>Clear Bill</button>
<button onclick='generatePDF()'>Download PDF</button>
</div>

<div id='history' class='page'>
<h2>Invoice History</h2>
<div id='historyList'></div>
<button class='danger-btn' onclick='clearHistory()'>Clear History</button>
</div>

<script src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js'></script>
<script src='app.js'></script>

<script>
if ("serviceWorker" in navigator) {
window.addEventListener("load", () => {
navigator.serviceWorker.register("./service-worker.js")
.then(()=>console.log("Service Worker Registered"))
.catch(err=>console.log(err));
});
}
</script>

</body>
</html>
